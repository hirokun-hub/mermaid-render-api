services:
  mermaid-render-api:
    build:
      context: .
    ports:
      - '3100:3000'
    env_file:
      - .env
    user: '1000:1000'
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m
      - /tmp/mermaid-render-api:rw,noexec,nosuid,nodev,size=256m
      - /home/node/.cache:rw,noexec,nosuid,nodev,size=128m
    shm_size: '256m'
    pids_limit: 256
    mem_limit: 1g
    cap_drop:
      - ALL
    restart: unless-stopped
