<!doctype html>
<html><head><meta charset="utf-8"><title>img embed test</title>
<style>body{font-family:sans-serif;margin:24px} .frame{border:1px dashed #999;margin-bottom:24px;padding:8px} h3{margin:4px 0}</style>
</head><body>
<h3>(1) Parent 320px (mobile), useMaxWidth=false</h3>
<div class="frame" style="width:320px;background:#fff8f8">
  <img src="6-usemaxwidth-false.svg" style="display:block;background:#fff">
</div>
<h3>(2) Parent 320px (mobile), useMaxWidth=true</h3>
<div class="frame" style="width:320px;background:#f8fff8">
  <img src="6-usemaxwidth-true.svg" style="display:block;background:#fff">
</div>
<h3>(3) Parent 800px (article), useMaxWidth=false</h3>
<div class="frame" style="width:800px;background:#fff8f8">
  <img src="6-usemaxwidth-false.svg" style="display:block;background:#fff">
</div>
<h3>(4) Parent 800px (article), useMaxWidth=true</h3>
<div class="frame" style="width:800px;background:#f8fff8">
  <img src="6-usemaxwidth-true.svg" style="display:block;background:#fff">
</div>
</body></html>
