<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><title>right-shift investigation</title>
<style>
  body { margin:0; padding:24px; font-family:sans-serif; background:#fafafa; }
  h2 { font-size:14px; margin: 24px 0 6px; }
  .row { display:flex; gap:32px; align-items:flex-start; }
  .box { background:#fff; padding:8px; border:1px solid #ccc; }
  .label { font-size:12px; color:#666; }
  img, object { display:block; }
  .crosshair { position: relative; }
  .crosshair::after {
    content:''; position:absolute; top:0; bottom:0; left:50%;
    width:1px; background:red; opacity:0.7; pointer-events:none;
  }
</style></head>
<body>
  <h2>① clipping-prone (CJK, longer than fO): SVG (img src) vs PNG</h2>
  <div class="row">
    <div class="box"><div class="label">SVG (via &lt;img src&gt;)</div>
      <div class="crosshair"><img src="case-clip.svg" alt="svg" /></div></div>
    <div class="box"><div class="label">PNG</div>
      <div class="crosshair"><img src="case-clip.png" alt="png" /></div></div>
    <div class="box"><div class="label">SVG (inline embed, themeCSS apply)</div>
      <div class="crosshair"><object data="case-clip.svg" type="image/svg+xml"></object></div></div>
  </div>

  <h2>② short text (fits inside fO) reference</h2>
  <div class="row">
    <div class="box"><div class="label">SVG (img)</div>
      <div class="crosshair"><img src="case-short.svg" alt="svg" /></div></div>
    <div class="box"><div class="label">PNG</div>
      <div class="crosshair"><img src="case-short.png" alt="png" /></div></div>
  </div>
</body></html>
